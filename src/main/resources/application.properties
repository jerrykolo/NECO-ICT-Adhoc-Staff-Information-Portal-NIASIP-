spring.application.name=NECO
server.port=${PORT:8080}

# Database - PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/niasip_db}
spring.datasource.username=${DB_USERNAME:thomas}
spring.datasource.password=${DB_PASSWORD:ebimobowei81}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# H2 Console disabled
spring.h2.console.enabled=false

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:NjNkNGZhNjBkNjhkZmE2ZWRmYWRmYWRmYWRmYWRmYWRmYWRmYWRmYWRmYWRmYWRmYWRmYWRmYWRmYWRmYWRmYWRmYWRm}
jwt.expiration=${JWT_EXPIRE:1200000}
jwt.token-prefix=Bearer

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# File Storage
app.upload.dir=${UPLOAD_DIR:./uploads}
app.upload.passport-dir=${PASSPORT_DIR:./uploads/passports}
app.upload.import-dir=${IMPORT_DIR:./uploads/imports}


# CORS
app.cors.allowed-origins=${CORS_ORIGINS:https://niasip.netlify.app,https://vmi2848672.contaboserver.net,https://wiseappsdev.cloud,http://localhost:4200,http://localhost}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
